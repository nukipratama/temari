# gitleaks config for teman-lari.
# Used by the pre-commit hook (.githooks/pre-commit) and any CI gitleaks job.
title = "teman-lari gitleaks"

# Start from gitleaks' built-in ruleset, then layer our allowlist on top.
[extend]
useDefault = true

[allowlist]
description = "Known false positives — documentation examples, not real secrets"
# The Laravel best-practices skill doc shows fake creds inside a "don't do this"
# block (e.g. STRIPE_SECRET=sk_live_abc123, AWS's canonical wJalrXUtnFEMI example).
paths = [
  '''\.claude/skills/.*\.md''',
]
regexes = [
  '''sk_live_abc123''',
  '''wJalrXUtnFEMI''',
]
