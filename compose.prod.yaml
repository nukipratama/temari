name: teman-lari-prod

x-app-image: &app-image teman-lari/app:latest

# Secrets and per-host config (APP_KEY, DB creds, STRAVA creds, feature flags)
# live in /opt/teman-lari/.env on the host — root-owned, 640, runner-readable.
# Compose loads them via env_file: on each service. Nothing flows through GitHub
# Actions secrets anymore.
x-app-env-file: &app-env-file
  - /opt/teman-lari/.env

x-app-env: &app-env
  APP_NAME: "TemanLari - Setiap Langkah Berarti"
  APP_ENV: production
  APP_DEBUG: "false"
  LOG_CHANNEL: daily
  LOG_LEVEL: info
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  REDIS_HOST: redis-data
  REDIS_CACHE_HOST: redis-cache
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  SESSION_CONNECTION: cache
  CACHE_STORE: redis
  TRUSTED_PROXIES: "127.0.0.1"
  TELESCOPE_ENABLED: "true"
  PULSE_ENABLED: "true"
  OCTANE_SERVER: frankenphp
  OCTANE_MAX_REQUESTS: "500"
  FRANKENPHP_NUM_WORKERS: "4"

x-app-base: &app-base
  image: *app-image
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: *app-env-file
  environment: *app-env
  depends_on:
    mysql:
      condition: service_healthy
    redis-data:
      condition: service_healthy
    redis-cache:
      condition: service_healthy
  networks: [internal]

services:
  app:
    <<: *app-base
    ports:
      # Loopback only — cloudflared on the host reaches it via 127.0.0.1:7001.
      - "127.0.0.1:7001:7001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7001/up"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  horizon:
    <<: *app-base
    command: ["php", "artisan", "horizon"]
    stop_grace_period: 60s
    # Image healthcheck is HTTP — disable on the queue worker.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  scheduler:
    <<: *app-base
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file: *app-env-file
    command:
      - "--innodb-buffer-pool-size=512M"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-log-file-size=256M"
      - "--max-connections=100"
      - "--performance-schema=OFF"
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [internal]
    healthcheck:
      # CMD-SHELL form + $$ defers interpolation to runtime inside the container
      # so MYSQL_ROOT_PASSWORD doesn't leak into `docker inspect` plaintext.
      # -h 127.0.0.1 forces TCP — UNIX socket is up before the listener.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g

  # Durable redis: queue jobs + Horizon state. AOF on, no eviction.
  redis-data:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "180mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Volatile redis: cache + sessions. No AOF, LRU eviction, pure RAM.
  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
      - "--maxmemory"
      - "180mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

volumes:
  mysql_data:
  redis_data:

networks:
  internal:
    driver: bridge
