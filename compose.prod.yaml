name: temari-prod

x-app-image: &app-image temari/app:latest

# Bound every container's json-file sink so a runaway stderr stream can't fill
# the host disk. Shared by app-tier, mysql, and both redis instances.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Secrets and per-host config (APP_KEY, DB creds, STRAVA creds, feature flags)
# live in /opt/temari/.env on the host — root-owned, 640, runner-readable.
# Compose loads them via env_file: on each service. Nothing flows through GitHub
# Actions secrets anymore.
x-app-env-file: &app-env-file
  - /opt/temari/.env

x-app-env: &app-env
  APP_NAME: "Temari - Setiap Langkah Berarti"
  APP_ENV: production
  APP_DEBUG: "false"
  # stack fans out to both: daily = persisted rotated history (survives deploys
  # via the app_logs volume), stderr = live `docker compose logs`. Both channels
  # are defined in config/logging.php.
  LOG_CHANNEL: stack
  LOG_STACK: "daily,stderr"
  LOG_LEVEL: info
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  # Two Redis instances. `redis` (durable: noeviction + AOF) holds queue +
  # Horizon state + sessions (DB 0) and the Pulse ingest buffer (DB 2).
  # `redis-cache` (allkeys-lru, no AOF) holds the cache keyspace so cache
  # growth can never hit noeviction and wedge queue enqueues / session writes.
  # Both listen on REDIS_PORT.
  REDIS_HOST: redis
  REDIS_CACHE_HOST: redis-cache
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  # Sessions live on the durable `redis` (DB 0, noeviction). Cache lives on the
  # dedicated `redis-cache` instance (DB 1 there), free to evict under pressure.
  SESSION_CONNECTION: default
  CACHE_STORE: redis
  # Pin the session cookie name and the Redis/cache key prefixes to fixed
  # literals instead of deriving them from APP_NAME (Str::slug(APP_NAME) plus
  # "-session" / "-database-" / "-cache-"). A cosmetic APP_NAME or tagline edit
  # would otherwise rename the cookie and shift every Redis key prefix, logging
  # everyone out on that deploy (PR #21's rename did exactly this). The values
  # below equal the current APP_NAME-derived slugs, so adopting them is a no-op
  # for existing sessions.
  SESSION_COOKIE: temari-setiap-langkah-berarti-session
  REDIS_PREFIX: temari-setiap-langkah-berarti-database-
  CACHE_PREFIX: temari-setiap-langkah-berarti-cache-
  PULSE_ENABLED: "true"
  # Stable name so the Servers card isn't a random per-container hash. Ingest is
  # buffered in Redis DB 2 (drained by the pulse service).
  PULSE_SERVER_NAME: temari-prod
  PULSE_INGEST_DRIVER: redis
  PULSE_REDIS_CONNECTION: pulse
  PULSE_REDIS_HOST: redis
  PULSE_REDIS_DB: "2"
  # Servers recorder runs in the pulse service, which bind-mounts the host root
  # read-only at /host so the disk metric reflects the real host disk.
  PULSE_SERVER_DIRECTORIES: "/host"
  # Currently unread: bootstrap/app.php hardcodes trustProxies(at: '*'). Kept
  # for documentation/future-use; changing it has no effect today.
  TRUSTED_PROXIES: "127.0.0.1"
  OCTANE_SERVER: frankenphp
  # NOTE: the runtime boots the Caddyfile worker directive, not `octane:start`,
  # so these two are inert here — the live recycle/sizing knobs are `num` and
  # `max_requests` in docker/Caddyfile. Kept (not deleted) to avoid churn and
  # to stay correct if we ever switch to octane:start.
  OCTANE_MAX_REQUESTS: "2000"
  FRANKENPHP_NUM_WORKERS: "2"

x-redis-prod-base: &redis-prod-base
  image: redis:8-alpine
  restart: unless-stopped
  networks: [internal]
  logging: *logging
  healthcheck:
    # SET (not ping) so `up --wait` blocks until AOF replay finishes: Redis
    # answers PONG while still LOADING the dataset into memory but rejects
    # writes, so a write probe is what actually proves the keyspace is ready.
    # Without this, app/horizon can connect mid-replay and read empty sessions.
    test: ["CMD", "redis-cli", "SET", "__hc__", "1", "EX", "5"]
    interval: 10s
    timeout: 3s
    retries: 10
    start_period: 30s

x-app-base: &app-base
  image: *app-image
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: *app-env-file
  environment: *app-env
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    redis-cache:
      condition: service_healthy
  networks: [internal]
  volumes:
    # Persist rotated daily logs across container recreation (deploys).
    - app_logs:/var/www/html/storage/logs
  logging: *logging

services:
  app:
    <<: *app-base
    ports:
      # Loopback only — cloudflared on the host reaches it via 127.0.0.1:7001.
      - "127.0.0.1:7001:7001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7001/up"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
        # Floor: guarantee a slice during CI/build bursts on the shared 4-core
        # host. Floors for app+mysql+redis sum to 1.5 vCPU, well under 4.
        reservations:
          cpus: "0.75"

  horizon:
    <<: *app-base
    command: ["php", "artisan", "horizon"]
    stop_grace_period: 60s
    # Override the image's HTTP healthcheck: a wedged supervisor keeps the
    # container alive but stops processing. horizon:status exits 0 running,
    # 1 paused, 2 inactive — so paused/dead both surface as `unhealthy`.
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  scheduler:
    <<: *app-base
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Combined Pulse daemon: pulse:check (Servers recorder) + pulse:work (ingest drain).
  # Bind-mounts host root read-only so the disk metric reflects the real host disk.
  # $$ (not $) on every PULSE_CHECK_PID/PULSE_WORK_PID reference below: Compose
  # interpolates `$VAR` in `command:` itself before the container ever sees the
  # script, and PULSE_CHECK_PID/PULSE_WORK_PID aren't real Compose variables — a
  # live incident found `docker compose config` silently blanking them, which
  # turned `kill $PULSE_CHECK_PID $PULSE_WORK_PID` into a no-op `kill` and left
  # pulse:check running solo for hours with no container restart. `$$` escapes
  # past Compose's interpolation so the container's own shell resolves them.
  # Polls both PIDs rather than `wait -n` since this image's /bin/sh is busybox,
  # where `wait -n` isn't guaranteed portable; polling was verified live.
  pulse:
    <<: *app-base
    command:
      - "/bin/sh"
      - "-c"
      - |
        php artisan pulse:check &
        PULSE_CHECK_PID=$!
        php artisan pulse:work &
        PULSE_WORK_PID=$!
        # Exit (triggering Docker restart) as soon as either child dies.
        while kill -0 "$$PULSE_CHECK_PID" 2>/dev/null && kill -0 "$$PULSE_WORK_PID" 2>/dev/null; do
            sleep 1
        done
        kill $$PULSE_CHECK_PID $$PULSE_WORK_PID 2>/dev/null
        wait
    stop_grace_period: 30s
    volumes:
      - app_logs:/var/www/html/storage/logs
      - /:/host:ro
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  mysql:
    # Custom image = stock mysql + the bootstrap baked into initdb (see docker/mysql/
    # Dockerfile), so a fresh volume self-initializes on any machine. compose builds it
    # on `up` if missing; existing volumes are unaffected (initdb only runs once).
    image: temari/mysql:8.4
    build:
      context: ./docker/mysql
    restart: unless-stopped
    env_file: *app-env-file
    command:
      - "--innodb-buffer-pool-size=1536M"
      - "--innodb-redo-log-capacity=536870912"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-flush-method=O_DIRECT"
      # app workers + horizon (≤10) + scheduler + adhoc artisan ≈ 25 peak.
      - "--max-connections=40"
      - "--performance-schema=OFF"
      # Skip reverse-DNS on every TCP connect — every connection from the
      # Octane workers is a hot path.
      - "--skip-name-resolve"
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [internal]
    logging: *logging
    healthcheck:
      # CMD-SHELL form + $$ defers interpolation to runtime inside the container
      # so MYSQL_ROOT_PASSWORD doesn't leak into `docker inspect` plaintext.
      # -h 127.0.0.1 forces TCP — UNIX socket is up before the listener.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2g
        # Floor: keep the DB responsive when a deploy build saturates the host.
        reservations:
          cpus: "0.5"

  # Durable Redis, DB-level separation, noeviction so a full keyspace ERRORs
  # (never silently drops a durable key):
  #   DB 0 = queue jobs + Horizon state + sessions
  #   DB 2 = Pulse ingest buffer (PULSE_REDIS_DB=2)
  # Cache is NOT here anymore — it lives on the `redis-cache` instance below so
  # cache growth can't push this store into noeviction and stall enqueues.
  # AOF everysec provides queue durability without the fsync overhead of always.
  redis:
    <<: *redis-prod-base
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 640m
        # Floor: queue/session store must not starve during build bursts.
        reservations:
          cpus: "0.25"

  # Dedicated cache Redis, split off `redis` above (DBG-8). allkeys-lru lets it
  # evict under memory pressure instead of ERRORing, so cache growth can never
  # wedge the durable queue/session store. appendonly no: cache is ephemeral and
  # rebuilds itself, so no AOF and no persistence volume (a restart = cold cache,
  # which the app refills lazily). Reuses the redis-prod-base SET write-probe
  # healthcheck (no AOF replay here, but the probe still proves writes are live).
  redis-cache:
    <<: *redis-prod-base
    command:
      - "redis-server"
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320m
        reservations:
          cpus: "0.1"

volumes:
  mysql_data:
  redis_data:
  app_logs:

networks:
  internal:
    driver: bridge
