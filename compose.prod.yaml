name: teman-lari-prod

x-app-image: &app-image teman-lari/app:latest

# Secrets and per-host config (APP_KEY, DB creds, STRAVA creds, feature flags)
# live in /opt/teman-lari/.env on the host — root-owned, 640, runner-readable.
# Compose loads them via env_file: on each service. Nothing flows through GitHub
# Actions secrets anymore.
x-app-env-file: &app-env-file
  - /opt/teman-lari/.env

x-app-env: &app-env
  TZ: Asia/Jakarta
  APP_NAME: "TemanLari - Setiap Langkah Berarti"
  APP_ENV: production
  APP_DEBUG: "false"
  # stack fans out to both: daily = persisted rotated history (survives deploys
  # via the app_logs volume), stderr = live `docker compose logs`. Both channels
  # are defined in config/logging.php.
  LOG_CHANNEL: stack
  LOG_STACK: "daily,stderr"
  LOG_LEVEL: info
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  # Single Redis instance; DB 0 = queue/sessions (noeviction), DB 1 = cache,
  # DB 2 = pulse ingest buffer. All three connections point at the same host.
  REDIS_HOST: redis
  REDIS_CACHE_HOST: redis
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  # Sessions live on DB 0 (noeviction). Cache on DB 1 (same instance, but
  # volatile-ok keys are namespaced away from queue/session keys by DB number).
  SESSION_CONNECTION: default
  CACHE_STORE: redis
  PULSE_ENABLED: "true"
  # Stable name so the Servers card isn't a random per-container hash. Ingest is
  # buffered in Redis DB 2 (drained by the pulse service).
  PULSE_SERVER_NAME: teman-lari-prod
  PULSE_INGEST_DRIVER: redis
  PULSE_REDIS_CONNECTION: pulse
  PULSE_REDIS_HOST: redis
  PULSE_REDIS_DB: "2"
  # Servers recorder runs in the pulse service, which bind-mounts the host root
  # read-only at /host so the disk metric reflects the real host disk.
  PULSE_SERVER_DIRECTORIES: "/host"
  # Currently unread: bootstrap/app.php hardcodes trustProxies(at: '*'). Kept
  # for documentation/future-use; changing it has no effect today.
  TRUSTED_PROXIES: "127.0.0.1"
  OCTANE_SERVER: frankenphp
  # NOTE: the runtime boots the Caddyfile worker directive, not `octane:start`,
  # so these two are inert here — the live recycle/sizing knobs are `num` and
  # `max_requests` in docker/Caddyfile. Kept (not deleted) to avoid churn and
  # to stay correct if we ever switch to octane:start.
  OCTANE_MAX_REQUESTS: "2000"
  FRANKENPHP_NUM_WORKERS: "2"

x-redis-prod-base: &redis-prod-base
  image: redis:8-alpine
  restart: unless-stopped
  networks: [internal]
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 3s
    retries: 5

x-app-base: &app-base
  image: *app-image
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: *app-env-file
  environment: *app-env
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks: [internal]
  volumes:
    # Persist rotated daily logs across container recreation (deploys).
    - app_logs:/var/www/html/storage/logs
  logging:
    # Bound the json-file sink so the stderr stream can't fill the disk.
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  app:
    <<: *app-base
    ports:
      # Loopback only — cloudflared on the host reaches it via 127.0.0.1:7001.
      - "127.0.0.1:7001:7001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7001/up"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  horizon:
    <<: *app-base
    command: ["php", "artisan", "horizon"]
    stop_grace_period: 60s
    # Image healthcheck is HTTP — disable on the queue worker.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  scheduler:
    <<: *app-base
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Combined Pulse daemon: pulse:check (Servers recorder) + pulse:work (ingest drain).
  # Bind-mounts host root read-only so the disk metric reflects the real host disk.
  # pulse:work is PID 1 (exec'd) and receives SIGTERM for graceful drain on stop.
  # pulse:check is monitored: if it exits, the wrapper exits too so Docker restarts
  # the whole container (same restart: unless-stopped that protected the old separate
  # pulse-check container).
  pulse:
    <<: *app-base
    command:
      - "/bin/sh"
      - "-c"
      - |
        php artisan pulse:check &
        PULSE_CHECK_PID=$!
        php artisan pulse:work &
        PULSE_WORK_PID=$!
        # Exit (triggering Docker restart) if either child dies.
        wait -n
        kill $PULSE_CHECK_PID $PULSE_WORK_PID 2>/dev/null
        wait
    stop_grace_period: 30s
    volumes:
      - app_logs:/var/www/html/storage/logs
      - /:/host:ro
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  mysql:
    # Custom image = stock mysql + the bootstrap baked into initdb (see docker/mysql/
    # Dockerfile), so a fresh volume self-initializes on any machine. compose builds it
    # on `up` if missing; existing volumes are unaffected (initdb only runs once).
    image: teman-lari/mysql:8.4
    build:
      context: ./docker/mysql
    restart: unless-stopped
    env_file: *app-env-file
    command:
      - "--innodb-buffer-pool-size=1536M"
      - "--innodb-redo-log-capacity=536870912"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-flush-method=O_DIRECT"
      # app workers + horizon (≤10) + scheduler + adhoc artisan ≈ 25 peak.
      - "--max-connections=40"
      - "--performance-schema=OFF"
      # Skip reverse-DNS on every TCP connect — every connection from the
      # Octane workers is a hot path.
      - "--skip-name-resolve"
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [internal]
    healthcheck:
      # CMD-SHELL form + $$ defers interpolation to runtime inside the container
      # so MYSQL_ROOT_PASSWORD doesn't leak into `docker inspect` plaintext.
      # -h 127.0.0.1 forces TCP — UNIX socket is up before the listener.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2g

  # Single Redis instance with DB-level separation:
  #   DB 0 = queue jobs + Horizon state + sessions (noeviction)
  #   DB 1 = cache (REDIS_CACHE_DB=1, keys namespaced away from queue)
  #   DB 2 = Pulse ingest buffer (PULSE_REDIS_DB=2, LRU-safe via allkeys-lru
  #           is NOT used here — noeviction is safer for the combined store;
  #           at current usage ~37 MB across all three DBs, 512 MB is ample)
  # AOF everysec provides queue durability without the fsync overhead of always.
  redis:
    <<: *redis-prod-base
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 640m

volumes:
  mysql_data:
  redis_data:
  app_logs:

networks:
  internal:
    driver: bridge
