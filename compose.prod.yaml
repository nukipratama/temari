name: teman-lari-prod

x-app-image: &app-image teman-lari/app:latest

# Secrets and per-host config (APP_KEY, DB creds, STRAVA creds, feature flags)
# live in /opt/teman-lari/.env on the host — root-owned, 640, runner-readable.
# Compose loads them via env_file: on each service. Nothing flows through GitHub
# Actions secrets anymore.
x-app-env-file: &app-env-file
  - /opt/teman-lari/.env

x-app-env: &app-env
  APP_NAME: "TemanLari - Setiap Langkah Berarti"
  APP_ENV: production
  APP_DEBUG: "false"
  # stack fans out to both: daily = persisted rotated history (survives deploys
  # via the app_logs volume), stderr = live `docker compose logs`. Both channels
  # are defined in config/logging.php.
  LOG_CHANNEL: stack
  LOG_STACK: "daily,stderr"
  LOG_LEVEL: info
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  REDIS_HOST: redis-data
  REDIS_CACHE_HOST: redis-cache
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  # Sessions live on the durable (noeviction) Redis. The cache connection has
  # allkeys-lru and would silently log users out under cache pressure.
  SESSION_CONNECTION: default
  CACHE_STORE: redis
  TRUSTED_PROXIES: "127.0.0.1"
  PULSE_ENABLED: "true"
  # Stable name so the Servers card isn't a random per-container hash. Ingest is
  # offloaded to a dedicated pulse-redis (drained by pulse-work) — see below.
  PULSE_SERVER_NAME: teman-lari-homelab
  PULSE_INGEST_DRIVER: redis
  PULSE_REDIS_CONNECTION: pulse
  PULSE_REDIS_HOST: pulse-redis
  # Servers recorder runs only in pulse-check, which bind-mounts the host root
  # read-only at /host so the disk metric reflects the real homelab disk.
  PULSE_SERVER_DIRECTORIES: "/host"
  OCTANE_SERVER: frankenphp
  OCTANE_MAX_REQUESTS: "2000"
  FRANKENPHP_NUM_WORKERS: "2"

x-app-base: &app-base
  image: *app-image
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: *app-env-file
  environment: *app-env
  depends_on:
    mysql:
      condition: service_healthy
    redis-data:
      condition: service_healthy
    redis-cache:
      condition: service_healthy
  networks: [internal]
  volumes:
    # Persist rotated daily logs across container recreation (deploys).
    - app_logs:/var/www/html/storage/logs
  logging:
    # Bound the json-file sink so the stderr stream can't fill the disk.
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  app:
    <<: *app-base
    ports:
      # Loopback only — cloudflared on the host reaches it via 127.0.0.1:7001.
      - "127.0.0.1:7001:7001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7001/up"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  horizon:
    <<: *app-base
    command: ["php", "artisan", "horizon"]
    stop_grace_period: 60s
    # Image healthcheck is HTTP — disable on the queue worker.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  scheduler:
    <<: *app-base
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Pulse Servers recorder daemon. Without this the /pulse Servers card is empty.
  # Bind-mounts the host root read-only so the disk metric is the real homelab
  # disk, not this container's overlay fs (PULSE_SERVER_DIRECTORIES=/host).
  pulse-check:
    <<: *app-base
    command: ["php", "artisan", "pulse:check"]
    depends_on:
      mysql:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      pulse-redis:
        condition: service_healthy
    volumes:
      - app_logs:/var/www/html/storage/logs
      - /:/host:ro
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  # Drains the Pulse ingest stream (pulse-redis) into MySQL. If this is down the
  # dashboard silently stops updating — entries buffer in pulse-redis (LRU).
  pulse-work:
    <<: *app-base
    command: ["php", "artisan", "pulse:work"]
    depends_on:
      mysql:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      pulse-redis:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  # Dedicated ingest buffer for Pulse. MUST be separate from redis-data: a Pulse
  # backlog here LRU-trims (just lost metrics) instead of filling the noeviction
  # queue/session store and breaking job dispatch.
  pulse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
      - "--maxmemory"
      - "64mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96m

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file: *app-env-file
    command:
      - "--innodb-buffer-pool-size=768M"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-flush-method=O_DIRECT"
      - "--innodb-log-file-size=256M"
      # app workers + horizon (≤10) + scheduler + adhoc artisan ≈ 25 peak.
      - "--max-connections=40"
      - "--performance-schema=OFF"
      # Skip reverse-DNS on every TCP connect — every connection from the
      # Octane workers is a hot path.
      - "--skip-name-resolve"
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [internal]
    healthcheck:
      # CMD-SHELL form + $$ defers interpolation to runtime inside the container
      # so MYSQL_ROOT_PASSWORD doesn't leak into `docker inspect` plaintext.
      # -h 127.0.0.1 forces TCP — UNIX socket is up before the listener.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g

  # Durable redis: queue jobs + Horizon state. AOF on, no eviction.
  redis-data:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "180mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # Volatile redis: cache + sessions. No AOF, LRU eviction, pure RAM.
  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
      - "--maxmemory"
      - "180mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

volumes:
  mysql_data:
  redis_data:
  app_logs:

networks:
  internal:
    driver: bridge
