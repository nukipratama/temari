; Dev PHP settings — opcache checks file timestamps so edits are picked up
; without a container restart. JIT disabled (cold start overhead not worth it
; for per-request mode).

opcache.enable = 1
opcache.enable_cli = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.jit = 0
opcache.jit_buffer_size = 0
memory_limit = 512M
