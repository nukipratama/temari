; opcache + JIT tuning for FrankenPHP worker mode.
; Loaded as /usr/local/etc/php/conf.d/zz-app.ini so it overrides the image's
; defaults (zz prefix sorts last alphabetically).

opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1

; Tracing JIT — best for long-running worker processes (Octane).
opcache.jit = tracing
opcache.jit_buffer_size = 128M

; Worker mode keeps PHP processes alive; raise the per-process memory ceiling
; so request bursts don't OOM the worker before it can recycle.
memory_limit = 512M
