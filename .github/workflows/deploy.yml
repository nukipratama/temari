name: Deploy

# Triggered by the CI workflow's completion on main. Only deploys when CI
# concluded successfully — `workflow_run` fires on every conclusion (success,
# failure, cancelled), so the `if:` guard below is what gates the actual run.
#
# The handoff: every push to main fires CI; CI green → this workflow fires;
# this workflow checks out main at the same SHA CI tested and rolls the
# prod stack on the homelab runner.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to homelab
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, homelab]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      COMPOSE: docker compose -f compose.prod.yaml
      # Required by compose.prod.yaml — sourced from repo Secrets.
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_URL: ${{ secrets.APP_URL }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
    steps:
      # workflow_run runs against the default branch by default. Pin to the
      # exact SHA CI validated so we deploy the code that just passed.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Tag current :latest as :previous (rollback target)
        run: |
          if docker image inspect teman-lari/app:latest >/dev/null 2>&1; then
            docker tag teman-lari/app:latest teman-lari/app:previous
          fi

      - name: Build new image
        run: $COMPOSE build app

      - name: Tag new image with git SHA
        run: docker tag teman-lari/app:latest teman-lari/app:${{ github.event.workflow_run.head_sha }}

      - name: Migrate (one-shot, on the new image)
        run: $COMPOSE run --rm app php artisan migrate --force

      - name: Roll app, horizon, scheduler onto the new image
        run: $COMPOSE up -d --no-deps app horizon scheduler

      - name: Optimize caches
        run: $COMPOSE exec -T app php artisan optimize

      - name: Recycle Horizon workers onto new code
        run: $COMPOSE exec -T app php artisan horizon:terminate

      - name: Healthcheck
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:7001/up; then
              echo "Healthcheck passed"; exit 0
            fi
            sleep 3
          done
          echo "Healthcheck failed"; exit 1

      - name: Prune old images (-a includes SHA-tagged but unused; respects in-use)
        if: always()
        continue-on-error: true
        run: docker image prune -a -f --filter "until=168h"
