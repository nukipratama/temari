name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PHP_VERSION: '8.4'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      # Classify the push so each suite skips when its files weren't touched.
      # Shared-infra paths (ci.yml, Dockerfile, compose, .env.example) match
      # both, so an infra change runs the full pipeline. Diff is against the
      # merge-base with main; on main pushes both jobs run anyway (see the `if`).
      - name: Detect changed areas
        id: filter
        run: |
          git fetch --no-tags --quiet origin main
          changed=$(git diff --name-only "$(git merge-base origin/main HEAD)" HEAD)
          printf 'Changed files:\n%s\n' "$changed"
          backend=false; frontend=false
          if printf '%s\n' "$changed" | grep -qE '^(app|bootstrap|config|database|routes|tests)/|^composer\.(json|lock)$|^phpunit\.xml$|^artisan$|^\.github/workflows/ci\.yml$|^Dockerfile$|^compose[^/]*\.yaml$|^\.env\.example$'; then
            backend=true
          fi
          if printf '%s\n' "$changed" | grep -qE '^resources/(js|css|views)/|^package(-lock)?\.json$|^vite\.config\.ts$|^vitest\.config\.ts$|^tsconfig\.json$|^eslint\.config\.|^\.github/workflows/ci\.yml$|^Dockerfile$|^compose[^/]*\.yaml$|^\.env\.example$'; then
            frontend=true
          fi
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "Result: backend=$backend frontend=$frontend"

  # Runs on every event, independent of the path filter.
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: teman_lari_testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports: ['0:3306']
        # tmpfs on /var/lib/mysql makes the data dir RAM-backed — service cold
        # boot drops from ~30s to a few seconds and per-test DB churn under
        # paratest stops touching disk.
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=5s --health-timeout=2s --health-retries=10
          --tmpfs /var/lib/mysql:rw
      redis:
        image: redis:8-alpine
        ports: ['0:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=2s --health-retries=10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show runner resources
        # Surfaces what this runner actually offers — paratest/vitest scale to
        # $(nproc), so this is the worker count too. Private-repo ubuntu-latest
        # is 2-vCPU; bump to a larger runner here if the test phase needs it.
        run: |
          {
            echo "### Runner: $(nproc) vCPU ($(uname -m))"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| nproc (= test workers) | $(nproc) |"
            echo "| Model | $(lscpu | sed -n 's/^Model name:[[:space:]]*//p') |"
            echo "| Memory | $(free -h | awk '/^Mem:/{print $2}') |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: pcov
          # Enable CLI opcache for the pest workers. JIT is explicitly
          # disabled — pcov overrides zend_execute_ex() to instrument lines,
          # and PHP's default opcache.jit=tracing would otherwise spam
          # "JIT is incompatible with..." on every paratest worker boot.
          ini-values: >-
            opcache.enable=1,
            opcache.enable_cli=1,
            opcache.memory_consumption=256,
            opcache.max_accelerated_files=20000,
            opcache.validate_timestamps=0,
            opcache.jit=disable,
            opcache.jit_buffer_size=0

      - name: Cache composer vendor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        # classmap-authoritative bakes a static classmap into vendor/composer/.
        # Pest autoloads ~10k classes during a run; without this every class
        # load does a filesystem stat per PSR-4 path.
        run: composer install --prefer-dist --no-interaction --no-progress --classmap-authoritative

      - name: Audit composer dependencies
        # Fails the build on any known advisory in composer.lock. Cheap
        # supply-chain gate for an internet-facing app.
        run: composer audit --no-interaction

      - name: Stub .env so Laravel doesn't warn on bootstrap
        run: cp .env.example .env

      # Fast structural gate: fail before the expensive coverage run if any
      # app class lacks a matching test (the 1:1 convention). No DB needed.
      - name: Class/test 1:1 structure check
        run: ./vendor/bin/pest --group=structure

      # Invoke pest directly, not `php artisan test --parallel --coverage` —
      # the artisan wrapper silently drops --coverage in parallel mode.
      # env is set at step level because job.services.*.ports is only
      # available there, not at job-level env.
      - name: Tests (fast, no coverage)
        if: github.ref != 'refs/heads/main'
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: teman_lari_testing
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
        run: |
          # Scale paratest workers to the runner's core count ($(nproc)) instead
          # of a fixed 4 — so this tracks whatever hosted runner size we use.
          ./vendor/bin/pest --parallel --processes="$(nproc)" \
            --fail-on-warning --fail-on-notice \
            --fail-on-deprecation --fail-on-risky \
            --fail-on-phpunit-warning --fail-on-phpunit-notice \
            --fail-on-phpunit-deprecation 2>&1 | tee /tmp/pest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Tests + 95% coverage
        if: github.ref == 'refs/heads/main'
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: teman_lari_testing
          # paratest auto-creates per-process DBs (teman_lari_testing_test_N) — the
          # sail user only owns its own DB, so the test runner uses root for the
          # CREATE DATABASE privilege.
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
        run: |
          ./vendor/bin/pest --parallel --processes="$(nproc)" --coverage --min=95 \
            --fail-on-warning --fail-on-notice \
            --fail-on-deprecation --fail-on-risky \
            --fail-on-phpunit-warning --fail-on-phpunit-notice \
            --fail-on-phpunit-deprecation 2>&1 | tee /tmp/pest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Pest summary
        if: always()
        run: |
          {
            echo "### Backend · Tests (Pest)"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            # Strip ANSI escapes first (pest writes color + cursor-move codes);
            # grep can't anchor "^[space]*Tests" otherwise.
            sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/pest-output.txt \
              | grep -E "^[[:space:]]*(Tests|Duration|Parallel):" \
              | sed -E 's/^[[:space:]]*([A-Za-z]+):[[:space:]]*/| \1 | /; s/$/ |/'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show runner resources
        run: |
          {
            echo "### Runner: $(nproc) vCPU ($(uname -m))"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| nproc (= vitest workers) | $(nproc) |"
            echo "| Model | $(lscpu | sed -n 's/^Model name:[[:space:]]*//p') |"
            echo "| Memory | $(free -h | awk '/^Mem:/{print $2}') |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Cache node_modules itself, not just the npm download cache. With a
      # hit, `npm ci` is skipped entirely (the download cache is a fallback).
      - name: Cache node_modules
        id: node_modules_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm deps
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Audit npm dependencies (prod, high+)
        # Only production deps, only high/critical — dev-tool advisories and
        # low-severity noise shouldn't block a deploy.
        run: npm audit --omit=dev --audit-level=high

      # Fast structural gate: fail before the full coverage run if any
      # component/page lacks a co-located *.test.tsx (the 1:1 convention).
      - name: Component/test 1:1 structure check
        run: npx vitest run resources/js/test/structure.test.ts

      - name: Vitest (fast, no coverage)
        if: github.ref != 'refs/heads/main'
        run: npm run test

      - name: Vitest + 95% coverage
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage

      - name: Vitest summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            {
              echo "### Frontend · Tests (Vitest)"
              echo ""
              echo "| Metric | % | Covered / Total |"
              echo "| --- | --- | --- |"
              jq -r '.total | to_entries[] | select(.key as $k | ["lines","functions","statements","branches"] | index($k)) | "| \(.key | ascii_upcase[0:1] + .[1:]) | \(.value.pct)% | \(.value.covered) / \(.value.total) |"' coverage/coverage-summary.json
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # Single required check for branch protection.
  ci-gate:
    needs: [backend-tests, frontend-tests, secret-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require upstream jobs to have succeeded (or cleanly skipped)
        run: |
          for r in "${{ needs.backend-tests.result }}" "${{ needs.frontend-tests.result }}"; do
            [ "$r" = "success" ] || [ "$r" = "skipped" ] || { echo "::error::a test job did not pass ($r)"; exit 1; }
          done
          [ "${{ needs.secret-scan.result }}" = "success" ] \
            || { echo "::error::secret-scan did not pass (${{ needs.secret-scan.result }})"; exit 1; }

  deploy:
    name: Deploy
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, homelab]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      # All app secrets + per-host config live in /opt/teman-lari/.env on the
      # self-hosted runner, loaded by compose via `env_file:`. The workflow no
      # longer needs GitHub Secrets for these — see compose.prod.yaml.
      COMPOSE: docker compose -f compose.prod.yaml
      BACKUP_DIR: /var/lib/teman-lari-backups
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Tag current :latest as :previous (rollback target)
        run: |
          if docker image inspect teman-lari/app:latest >/dev/null 2>&1; then
            docker tag teman-lari/app:latest teman-lari/app:previous
          fi

      - name: Build new image
        run: $COMPOSE build app

      - name: Bring up the data + cache layer
        # Cold-start support: the steps below assume mysql/redis are running. On a fresh
        # machine this starts them (building the custom mysql image, whose initdb
        # self-bootstraps the schemas + app user + grants on the new volume); on an
        # existing machine it's a no-op apart from adopting an image/config change.
        # --wait blocks until healthchecks pass. So a new box needs only the secrets in
        # /opt/teman-lari/.env + a push — the deploy brings the stack online itself.
        run: $COMPOSE up -d --remove-orphans --wait --wait-timeout 300 mysql redis

      - name: Tag new image with git SHA
        run: docker tag teman-lari/app:latest teman-lari/app:${{ github.sha }}

      - name: Backup DB before migrate
        # pipefail: without it, mysqldump failing into a successful gzip looks
        # like a clean exit (bash -e only checks the last pipe stage). The
        # size check catches any other silent-empty regression.
        run: |
          set -o pipefail
          mkdir -p "$BACKUP_DIR"
          out="$BACKUP_DIR/pre-deploy-${{ github.sha }}.sql.gz"
          # The mysql container's env_file gives it DB_USERNAME / DB_PASSWORD /
          # DB_DATABASE (Laravel names) — the official MYSQL_USER etc. names
          # only existed when the old compose interpolated them explicitly.
          $COMPOSE exec -T mysql sh -c \
            'mysqldump -h 127.0.0.1 --single-transaction --quick --no-tablespaces -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_DATABASE"' \
            | gzip > "$out"
          size=$(stat -c%s "$out")
          # A fresh DB (0 tables — first deploy, or right after a reinit) legitimately
          # dumps to a tiny file; the migrate step below populates it. Only treat a tiny
          # dump as a failed backup when the schema actually has tables to lose.
          tables=$($COMPOSE exec -T mysql sh -c \
            'mysql -h 127.0.0.1 -N -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = \"$DB_DATABASE\""' \
            | tr -d '[:space:]')
          if [ "$size" -lt 1024 ] && [ "${tables:-0}" -gt 0 ]; then
            echo "::error::Backup at $out is only $size bytes (schema has $tables tables)"
            exit 1
          fi
          echo "Backup OK: $out ($size bytes, $tables tables)"
          ls -1t "$BACKUP_DIR"/pre-deploy-*.sql.gz | tail -n +11 | xargs -r rm

      - name: Backup analytics schema
        # Own dump + filename (so the main prune glob won't match it); skipped
        # until the schema exists.
        run: |
          out="$BACKUP_DIR/analytics-pre-deploy-${{ github.sha }}.sql.gz"
          if $COMPOSE exec -T mysql sh -c 'adb="${DB_ANALYTICS_DATABASE:-teman_lari_analytics}"; mysql -h 127.0.0.1 -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "USE $adb"' 2>/dev/null; then
            set -o pipefail
            $COMPOSE exec -T mysql sh -c 'adb="${DB_ANALYTICS_DATABASE:-teman_lari_analytics}"; mysqldump -h 127.0.0.1 --single-transaction --quick --no-tablespaces -u"$DB_USERNAME" -p"$DB_PASSWORD" --databases "$adb"' \
              | gzip > "$out"
            echo "Analytics backup OK: $out ($(stat -c%s "$out") bytes)"
            ls -1t "$BACKUP_DIR"/analytics-pre-deploy-*.sql.gz | tail -n +11 | xargs -r rm
          else
            echo "Analytics schema not present yet — skipping (first deploy)."
          fi

      - name: Quiesce scheduler + horizon before the roll
        # Stop the scheduler + horizon BEFORE migrate/roll: recreating a container
        # while one of its scheduled commands / jobs is mid-run is what stranded
        # the strava:ingest overlap mutex and froze ingest. `stop` sends SIGTERM so
        # Horizon drains its in-flight jobs gracefully, and (unlike horizon:terminate)
        # keeps them down so the restart policy can't resurrect them on the old image
        # during migrate. The scheduler is resumed only once the deploy is green.
        run: $COMPOSE stop scheduler horizon || true

      - name: Migrate (one-shot, on the new image)
        run: $COMPOSE run --rm app php artisan migrate --force

      - name: Migrate analytics schema
        # The analytics schema + app-user grant are a one-time bootstrap, not a per-deploy
        # concern: docker/mysql/init/01-databases.sh (see its header for the one-liner).
        # This step just migrates as the app user; blocking, so it fails loudly if missing.
        run: $COMPOSE run --rm app php artisan migrate --database=analytics --path=database/migrations/analytics --force

      - name: Roll app, workers + Pulse daemon onto the new image
        # The recreate gives Horizon fresh workers on the new code, so no separate
        # horizon:terminate recycle is needed. The scheduler is deliberately left
        # stopped here and only resumed once the deploy is green (below).
        run: $COMPOSE up -d --no-deps app horizon pulse

      - name: Optimize caches
        # Runs inside the running container where compose.prod.yaml's env
        # is loaded — caching at build time would freeze .env-less defaults
        # (e.g. DB_CONNECTION → sqlite) into the cached config.
        run: $COMPOSE exec -T app php artisan optimize

      - name: Healthcheck
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7001/up; then
              echo "Healthcheck passed"; exit 0
            fi
            sleep 3
          done
          echo "Healthcheck failed"; exit 1

      - name: Smoke test
        # /login is a public Inertia page that exercises session driver (redis)
        # and the Vite manifest. /up only proves the framework booted.
        run: |
          curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            http://127.0.0.1:7001/login

      - name: Resume scheduler (deploy green)
        # The scheduler was held stopped through migrate + the roll so no command
        # could be mid-run during a container restart. The deploy is healthy now,
        # so bring it back up on the new image.
        run: $COMPOSE up -d --no-deps scheduler

      - name: Prune old teman-lari images
        if: always()
        continue-on-error: true
        # Remove teman-lari/app SHA-tagged images that aren't :latest or :previous.
        # Avoids docker image prune -a which would evict unrelated images on the runner.
        run: |
          docker images "teman-lari/app" --format "{{.Tag}}\t{{.ID}}" \
            | grep -vE "^(latest|previous)" \
            | awk '{print $2}' \
            | xargs --no-run-if-empty docker rmi --force 2>/dev/null || true

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
