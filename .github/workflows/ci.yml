name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PHP_VERSION: '8.4'

jobs:
  # No DB / no redis — just static analysis + style.
  lint:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Cache composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Cache PHPStan analysis
        uses: actions/cache@v5
        with:
          path: .phpstan-cache
          key: phpstan-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('phpstan.neon', 'composer.lock') }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('phpstan.neon', 'composer.lock') }}-
            phpstan-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Cache Rector analysis
        uses: actions/cache@v5
        with:
          path: .rector-cache
          key: rector-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('rector.php', 'composer.lock') }}-${{ github.sha }}
          restore-keys: |
            rector-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('rector.php', 'composer.lock') }}-
            rector-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (PSR-12)
        id: pint
        run: ./vendor/bin/pint --test

      - name: PHPStan / Larastan level 8
        id: phpstan
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Rector dry-run
        id: rector
        run: ./vendor/bin/rector --dry-run --no-progress-bar

      - name: Lint summary
        if: always()
        run: |
          echo "## Lint" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Pint | ${{ steps.pint.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPStan | ${{ steps.phpstan.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rector | ${{ steps.rector.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # Test suite + 100% line-coverage gate. Boots Laravel against the mysql + redis
  # service containers; RefreshDatabase trait migrates the schema per-test class.
  pest:
    runs-on: [self-hosted, homelab]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: teman_lari_testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports: ['3306:3306']
        # tmpfs on /var/lib/mysql makes the data dir RAM-backed — service cold
        # boot drops from ~30s to a few seconds and per-test DB churn under
        # paratest stops touching disk.
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=5s --health-timeout=2s --health-retries=10
          --tmpfs /var/lib/mysql:rw
      redis:
        image: redis:alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=2s --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: teman_lari_testing
      # paratest auto-creates per-process DBs (teman_lari_testing_test_N) — the
      # sail user only owns its own DB, so the test runner uses root for the
      # CREATE DATABASE privilege.
      DB_USERNAME: root
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: pcov

      - name: Cache composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Stub .env so Laravel doesn't warn on bootstrap
        run: cp .env.example .env

      # NOTE: invoke pest directly, not `php artisan test --parallel --coverage`
      # — the artisan wrapper silently drops --coverage in parallel mode, so the
      # 100% gate would never run. Pest 4's own --parallel uses paratest and
      # honors --coverage end-to-end. Laravel's ParallelTesting (triggered by
      # the TEST_TOKEN paratest sets) still handles per-process DB creation.
      - name: Tests + 100% line coverage
        id: pest
        run: |
          ./vendor/bin/pest --parallel --processes=4 --coverage --min=100 \
            --fail-on-warning --fail-on-notice \
            --fail-on-deprecation --fail-on-risky \
            --fail-on-phpunit-warning --fail-on-phpunit-notice \
            --fail-on-phpunit-deprecation 2>&1 | tee /tmp/pest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Pest summary
        if: always()
        run: |
          echo "## Tests (Pest)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "Tests:|Duration:|FAILED|PASSED" /tmp/pest-output.txt \
            | sed 's/\x1b\[[0-9;]*[mGKHF]//g' \
            | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # React unit + component tests via Vitest. Gates on the same 100% line+function
  # coverage bar as the PHP suite. Pure FE — no DB, no PHP runtime.
  vitest:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install npm deps
        run: npm ci --prefer-offline --no-audit --no-fund

      # Coverage instrumentation roughly doubles vitest wall time. PRs run the
      # fast suite; the 100% gate still blocks merges via the push-to-main run.
      - name: Vitest (PR — no coverage)
        if: github.event_name == 'pull_request'
        run: npm test

      - name: Vitest + 100% line/function coverage (main)
        if: github.event_name != 'pull_request'
        run: npm run test:coverage

