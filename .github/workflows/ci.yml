        run: |
          {
            echo "### Backend · Tests (Pest)"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/pest-output.txt \
              | grep -E "^[[:space:]]*(Tests|Duration|Parallel|Coverage):" \
              | sed -E 's/^[[:space:]]*([A-Za-z ]+):[[:space:]]*/| \1 | /; s/$/ |/'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Backend: PR aggregator ─────────────────────────────────────────────
  # Lightweight — no services, no PHP, no checkout. Just a shell-echo.
  # Actual testing happened in the 4 PR child jobs above.
  backend-tests-pr:
    name: Backend
    needs: [backend-unit-run, backend-unit-ai, backend-unit-other, backend-feature]
    if: github.ref != 'refs/heads/main' && !cancelled() && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All backend children passed"

  # ═════════════════════════════════════════════════════════════════════════
  # Frontend tests
  # ═════════════════════════════════════════════════════════════════════════
  frontend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' }}
    strategy:
      matrix:
        shard: ${{ github.ref == 'refs/heads/main' && fromJSON('[0]') || fromJSON('[1, 2]') }}
    name: ${{ matrix.shard == 0 && 'Frontend' || format('Frontend (shard {0}/2)', matrix.shard) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show runner resources
        run: |
          {
            echo "### Runner: $(nproc) vCPU ($(uname -m))"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| nproc (= vitest workers) | $(nproc) |"
            echo "| Model | $(lscpu | sed -n 's/^Model name:[[:space:]]*//p') |"
            echo "| Memory | $(free -h | awk '/^Mem:/{print $2}') |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Cache node_modules
        id: node_modules_cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm deps
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Audit npm dependencies (prod, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Class/test 1:1 structure check
        if: github.ref == 'refs/heads/main'
        run: npx vitest run resources/js/test/structure.test.ts

      - name: Vitest + 95% coverage
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage

      - name: Component/test 1:1 structure check
        if: github.ref != 'refs/heads/main' && matrix.shard == 1
        run: npx vitest run resources/js/test/structure.test.ts

      - name: Vitest shard
        if: github.ref != 'refs/heads/main'
        run: npx vitest run --shard=${{ matrix.shard }}/2

      - name: Vitest summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            {
              echo "### Frontend · Tests (Vitest)"
              echo ""
              echo "| Metric | % | Covered / Total |"
              echo "| --- | --- | --- |"
              jq -r '.total | to_entries[] | select(.key as $k | ["lines","functions","statements","branches"] | index($k)) | "| \(.key | ascii_upcase[0:1] + .[1:]) | \(.value.pct)% | \(.value.covered) / \(.value.total) |"' coverage/coverage-summary.json
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ═════════════════════════════════════════════════════════════════════════
  # CI gate + Deploy
  # ═════════════════════════════════════════════════════════════════════════
  ci-gate:
    needs: [backend-tests, backend-tests-pr, frontend-tests, secret-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require upstream jobs to have succeeded (or cleanly skipped)
        run: |
          for r in "${{ needs.backend-tests.result }}" "${{ needs.backend-tests-pr.result }}" "${{ needs.frontend-tests.result }}"; do
            [ -z "$r" ] && continue
            [ "$r" = "success" ] || [ "$r" = "skipped" ] || { echo "::error::a test job did not pass ($r)"; exit 1; }
          done
          [ "${{ needs.secret-scan.result }}" = "success" ] \
            || { echo "::error::secret-scan did not pass (${{ needs.secret-scan.result }})"; exit 1; }

  deploy:
    name: Deploy
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, homelab]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      COMPOSE: docker compose -f compose.prod.yaml
      BACKUP_DIR: /var/lib/teman-lari-backups
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Tag current :latest as :previous (rollback target)
        run: |
          if docker image inspect teman-lari/app:latest >/dev/null 2>&1; then
            docker tag teman-lari/app:latest teman-lari/app:previous
          fi

      - name: Build new image
        run: $COMPOSE build app

      - name: Bring up the data + cache layer
        run: $COMPOSE up -d --remove-orphans --wait --wait-timeout 300 mysql redis

      - name: Tag new image with git SHA
        run: docker tag teman-lari/app:latest teman-lari/app:${{ github.sha }}

      - name: Backup DB before migrate
        run: |
          set -o pipefail
          mkdir -p "$BACKUP_DIR"
          out="$BACKUP_DIR/pre-deploy-${{ github.sha }}.sql.gz"
          $COMPOSE exec -T mysql sh -c \
            'mysqldump -h 127.0.0.1 --single-transaction --quick --no-tablespaces -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_DATABASE"' \
            | gzip > "$out"
          size=$(stat -c%s "$out")
          tables=$($COMPOSE exec -T mysql sh -c \
            'mysql -h 127.0.0.1 -N -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = \"$DB_DATABASE\""' \
            | tr -d '[:space:]')
          if [ "$size" -lt 1024 ] && [ "${tables:-0}" -gt 0 ]; then
            echo "::error::Backup at $out is only $size bytes (schema has $tables tables)"
            exit 1
          fi
          echo "Backup OK: $out ($size bytes, $tables tables)"
          ls -1t "$BACKUP_DIR"/pre-deploy-*.sql.gz | tail -n +11 | xargs -r rm

      - name: Backup analytics schema
        run: |
          out="$BACKUP_DIR/analytics-pre-deploy-${{ github.sha }}.sql.gz"
          if $COMPOSE exec -T mysql sh -c 'adb="${DB_ANALYTICS_DATABASE:-teman_lari_analytics}"; mysql -h 127.0.0.1 -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "USE $adb"' 2>/dev/null; then
            set -o pipefail
            $COMPOSE exec -T mysql sh -c 'adb="${DB_ANALYTICS_DATABASE:-teman_lari_analytics}"; mysqldump -h 127.0.0.1 --single-transaction --quick --no-tablespaces -u"$DB_USERNAME" -p"$DB_PASSWORD" --databases "$adb"' \
              | gzip > "$out"
            echo "Analytics backup OK: $out ($(stat -c%s "$out") bytes)"
            ls -1t "$BACKUP_DIR"/analytics-pre-deploy-*.sql.gz | tail -n +11 | xargs -r rm
          else
            echo "Analytics schema not present yet — skipping (first deploy)."
          fi

      - name: Quiesce scheduler + horizon before the roll
        run: $COMPOSE stop scheduler horizon || true

      - name: Migrate (one-shot, on the new image)
        run: $COMPOSE run --rm app php artisan migrate --force

      - name: Migrate analytics schema
        run: $COMPOSE run --rm app php artisan migrate --database=analytics --path=database/migrations/analytics --force

      - name: Roll app, workers + Pulse daemon onto the new image
        run: $COMPOSE up -d --no-deps app horizon pulse

      - name: Optimize caches
        run: $COMPOSE exec -T app php artisan optimize

      - name: Healthcheck
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7001/up; then
              echo "Healthcheck passed"; exit 0
            fi
            sleep 3
          done
          echo "Healthcheck failed"; exit 1

      - name: Smoke test
        run: |
          curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            http://127.0.0.1:7001/login

      - name: Resume scheduler (deploy green)
        run: $COMPOSE up -d --no-deps scheduler

      - name: Prune old teman-lari images
        if: always()
        continue-on-error: true
        run: |
          docker images "teman-lari/app" --format "{{.Tag}}\t{{.ID}}" \
            | grep -vE "^(latest|previous)" \
            | awk '{print $2}' \
            | xargs --no-run-if-empty docker rmi --force 2>/dev/null || true

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
