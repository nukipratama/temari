name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PHP_VERSION: '8.4'

jobs:
  # No DB / no redis — just static analysis + style.
  lint:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Cache composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (PSR-12)
        run: ./vendor/bin/pint --test

      - name: PHPStan / Larastan level 8
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Rector dry-run
        run: ./vendor/bin/rector --dry-run --no-progress-bar

  # Test suite + 100% line-coverage gate. Boots Laravel against the mysql + redis
  # service containers; RefreshDatabase trait migrates the schema per-test class.
  pest:
    runs-on: [self-hosted, homelab]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: teman_lari_testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=5s --health-timeout=2s --health-retries=10
      redis:
        image: redis:alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=2s --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: teman_lari_testing
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: pcov

      - name: Cache composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Stub .env so Laravel doesn't warn on bootstrap
        run: cp .env.example .env

      - name: Tests + 100% line coverage
        run: >-
          ./vendor/bin/pest --coverage --min=100
          --fail-on-warning --fail-on-notice
          --fail-on-deprecation --fail-on-risky
          --fail-on-phpunit-warning --fail-on-phpunit-notice
          --fail-on-phpunit-deprecation

  # Deploy to homelab. Only runs after lint+pest pass on a push to main.
  # Builds the prod image on the runner and rolls containers via the local
  # Docker socket. All env values come from repo Secrets — `compose.prod.yaml`
  # uses `environment:` blocks with `${VAR}` substitution so nothing is ever
  # written to a host file.
  deploy:
    name: Deploy to homelab
    needs: [lint, pest]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, homelab]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      COMPOSE: docker compose -f compose.prod.yaml
      # Required by compose.prod.yaml — sourced from repo Secrets.
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_URL: ${{ secrets.APP_URL }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - name: Tag current :latest as :previous (rollback target)
        run: |
          if docker image inspect teman-lari/app:latest >/dev/null 2>&1; then
            docker tag teman-lari/app:latest teman-lari/app:previous
          fi

      - name: Build new image
        run: $COMPOSE build app

      - name: Tag new image with git SHA
        run: docker tag teman-lari/app:latest teman-lari/app:${{ github.sha }}

      - name: Migrate (one-shot, on the new image)
        run: $COMPOSE run --rm app php artisan migrate --force

      - name: Roll app, horizon, scheduler onto the new image
        run: $COMPOSE up -d --no-deps app horizon scheduler

      - name: Optimize caches
        run: $COMPOSE exec -T app php artisan optimize

      - name: Recycle Horizon workers onto new code
        run: $COMPOSE exec -T app php artisan horizon:terminate

      - name: Healthcheck
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:7001/up; then
              echo "Healthcheck passed"; exit 0
            fi
            sleep 3
          done
          echo "Healthcheck failed"; exit 1

      - name: Prune old images (-a includes SHA-tagged but unused; respects in-use)
        if: always()
        continue-on-error: true
        run: docker image prune -a -f --filter "until=168h"
