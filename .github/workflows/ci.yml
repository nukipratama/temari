name: CI

on:
  push:
  pull_request:

env:
  PHP_VERSION: '8.4'

jobs:
  # Test suite + 100% line-coverage gate. Boots Laravel against the mysql + redis
  # service containers; RefreshDatabase trait migrates the schema per-test class.
  pest:
    runs-on: [self-hosted, homelab]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: teman_lari_testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports: ['0:3306']
        # tmpfs on /var/lib/mysql makes the data dir RAM-backed — service cold
        # boot drops from ~30s to a few seconds and per-test DB churn under
        # paratest stops touching disk.
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=5s --health-timeout=2s --health-retries=10
          --tmpfs /var/lib/mysql:rw
      redis:
        image: redis:alpine
        ports: ['0:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=2s --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: pcov

      - name: Cache composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Stub .env so Laravel doesn't warn on bootstrap
        run: cp .env.example .env

      # NOTE: invoke pest directly, not `php artisan test --parallel --coverage`
      # — the artisan wrapper silently drops --coverage in parallel mode, so the
      # 100% gate would never run. Pest 4's own --parallel uses paratest and
      # honors --coverage end-to-end. Laravel's ParallelTesting (triggered by
      # the TEST_TOKEN paratest sets) still handles per-process DB creation.
      # NOTE: env is set at step level because `job.services.*.ports` context is
      # only available at step scope, not job-level env.
      - name: Tests + 100% line coverage
        id: pest
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: teman_lari_testing
          # paratest auto-creates per-process DBs (teman_lari_testing_test_N) — the
          # sail user only owns its own DB, so the test runner uses root for the
          # CREATE DATABASE privilege.
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
        run: |
          ./vendor/bin/pest --parallel --processes=4 --coverage --min=100 \
            --fail-on-warning --fail-on-notice \
            --fail-on-deprecation --fail-on-risky \
            --fail-on-phpunit-warning --fail-on-phpunit-notice \
            --fail-on-phpunit-deprecation 2>&1 | tee /tmp/pest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Pest summary
        if: always()
        run: |
          echo "## Tests (Pest)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "Tests:|Duration:|FAILED|PASSED" /tmp/pest-output.txt \
            | sed 's/\x1b\[[0-9;]*[mGKHF]//g' \
            | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # React unit + component tests via Vitest. Gates on the same 100% line+function
  # coverage bar as the PHP suite. Pure FE — no DB, no PHP runtime.
  vitest:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install npm deps
        run: npm ci --prefer-offline --no-audit --no-fund

      # Coverage instrumentation roughly doubles vitest wall time. PRs run the
      # fast suite; the 100% gate still blocks merges via the push-to-main run.
      - name: Vitest (PR — no coverage)
        if: github.event_name == 'pull_request'
        run: npm test

      - name: Vitest + 100% line/function coverage (main)
        if: github.event_name != 'pull_request'
        run: npm run test:coverage

  # Mutation testing via Infection. Runs in parallel with other CI jobs so the
  # full pipeline result is available faster. Blocks deploy: a low MSI means the
  # suite is brittle regardless of line coverage.
  mutation:
    runs-on: [self-hosted, homelab]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: teman_lari_testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports: ['0:3306']
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=5s --health-timeout=2s --health-retries=10
          --tmpfs /var/lib/mysql:rw
      redis:
        image: redis:alpine
        ports: ['0:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=2s --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: pcov

      - name: Cache composer vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install composer deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Stub .env
        run: cp .env.example .env

      # NOTE: env is set at step level because `job.services.*.ports` context is
      # only available at step scope, not job-level env.
      - name: Mutation tests (Infection)
        id: infection
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: teman_lari_testing
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
        run: |
          ./vendor/bin/infection --no-progress --logger-github 2>&1 | tee /tmp/infection-output.txt
          exit ${PIPESTATUS[0]}

      - name: Mutation summary
        if: always()
        run: |
          echo "## Mutation Testing (Infection)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "MSI|Killed|Escaped|Not covered|Mutation Score|Covered Code" /tmp/infection-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Deploy to homelab. Runs after all CI jobs pass. Only on pushes to main.
  # All env values come from repo Secrets — `compose.prod.yaml` uses
  # `environment:` blocks with `${VAR}` substitution so nothing is ever
  # written to a host file.
  deploy:
    name: Deploy to homelab
    needs: [pest, vitest, mutation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, homelab]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      COMPOSE: docker compose -f compose.prod.yaml
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_URL: ${{ secrets.APP_URL }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      DEMO_LOGIN_ENABLED: ${{ secrets.DEMO_LOGIN_ENABLED }}
      ONBOARDING_FORCE_SHOW: ${{ secrets.ONBOARDING_FORCE_SHOW }}
    steps:
      - uses: actions/checkout@v6

      - name: Tag current :latest as :previous (rollback target)
        run: |
          if docker image inspect teman-lari/app:latest >/dev/null 2>&1; then
            docker tag teman-lari/app:latest teman-lari/app:previous
          fi

      - name: Build new image
        run: $COMPOSE build app

      - name: Tag new image with git SHA
        run: docker tag teman-lari/app:latest teman-lari/app:${{ github.sha }}

      - name: Migrate (one-shot, on the new image)
        run: $COMPOSE run --rm app php artisan migrate --force

      - name: Roll app, horizon, scheduler onto the new image
        run: $COMPOSE up -d --no-deps app horizon scheduler

      - name: Optimize caches
        run: $COMPOSE exec -T app php artisan optimize

      - name: Recycle Horizon workers onto new code
        run: $COMPOSE exec -T app php artisan horizon:terminate

      - name: Healthcheck
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7001/up; then
              echo "Healthcheck passed"; exit 0
            fi
            sleep 3
          done
          echo "Healthcheck failed"; exit 1

      - name: Prune old teman-lari images
        if: always()
        continue-on-error: true
        # Remove teman-lari/app SHA-tagged images that aren't :latest or :previous.
        # Avoids docker image prune -a which would evict unrelated images on the runner.
        run: |
          docker images "teman-lari/app" --format "{{.Tag}}\t{{.ID}}" \
            | grep -vE "^(latest|previous)" \
            | awk '{print $2}' \
            | xargs --no-run-if-empty docker rmi --force 2>/dev/null || true

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
