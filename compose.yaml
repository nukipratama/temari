x-mysql-base: &mysql-base
    image: 'mysql:8.4'
    restart: unless-stopped
    networks:
        - sail
    healthcheck:
        test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
        retries: 3
        timeout: 5s

x-redis-base: &redis-base
    image: 'redis:alpine'
    networks:
        - sail
    healthcheck:
        test: ['CMD', 'redis-cli', 'ping']
        retries: 3
        timeout: 5s

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: dev
        image: 'teman-lari/dev'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
            - 'node_modules:/var/www/html/node_modules'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            db-init:
                condition: service_completed_successfully
    mysql:
        <<: *mysql-base
        command:
            - '--innodb-buffer-pool-size=128M'
            - '--innodb-log-buffer-size=16M'
            - '--max-connections=50'
            - '--performance-schema=OFF'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
            DB_ANALYTICS_DATABASE: '${DB_ANALYTICS_DATABASE:-teman_lari_analytics}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
    # One-shot: ensure the app schemas (main + analytics) exist + grant the app user, as
    # root, once mysql is healthy. Replaces the initdb mount so it covers existing volumes
    # too. Idempotent; exits when done. The app waits on it via depends_on.
    db-init:
        image: 'mysql:8.4'
        restart: 'no'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_USER: '${DB_USERNAME}'
            DB_DATABASE: '${DB_DATABASE}'
            DB_ANALYTICS_DATABASE: '${DB_ANALYTICS_DATABASE:-teman_lari_analytics}'
            DB_HOST: 'mysql'
        depends_on:
            mysql:
                condition: service_healthy
        # SQL inlined (no bind mount) so it works identically on the homelab's
        # docker-out-of-docker runner. `$$` escapes compose interpolation.
        entrypoint:
            - sh
            - -ec
            - |
                for db in "$${DB_DATABASE:-teman_lari}" "$${DB_ANALYTICS_DATABASE:-teman_lari_analytics}"; do
                  mysql -h "$${DB_HOST:-mysql}" -uroot -p"$$MYSQL_ROOT_PASSWORD" \
                    -e "CREATE DATABASE IF NOT EXISTS $$db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; GRANT ALL PRIVILEGES ON $$db.* TO '$${MYSQL_USER:-$$DB_USERNAME}'@'%';"
                  echo "schema $$db ready"
                done
                mysql -h "$${DB_HOST:-mysql}" -uroot -p"$$MYSQL_ROOT_PASSWORD" -e "FLUSH PRIVILEGES;"
        networks:
            - sail
    redis:
        <<: *redis-base
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
    mysql_test:
        <<: *mysql-base
        # Test workload: tmpfs storage, no durability, minimal connections.
        command:
            - '--innodb-buffer-pool-size=32M'
            - '--max-connections=20'
            - '--performance-schema=OFF'
            - '--innodb-flush-log-at-trx-commit=0'
            - '--innodb-doublewrite=0'
            - '--skip-log-bin'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: 'teman_lari_testing'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        tmpfs:
            - /var/lib/mysql
        volumes:
            # Grants the app user rights to create paratest's per-process DBs.
            - './docker/mysql-test-init.sh:/docker-entrypoint-initdb.d/10-grant-paratest.sh:ro'
    redis_test:
        <<: *redis-base
        command: ['redis-server', '--save', '', '--appendonly', 'no']
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    node_modules:
        driver: local
